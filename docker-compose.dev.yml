# ==========================================================================
# Desarrollo local: SOLO levanta PostgreSQL en un contenedor.
# La API y el frontend se ejecutan en tu máquina con `npm run dev`.
# Uso:  docker compose -f docker-compose.dev.yml up -d
# DATABASE_URL local: postgresql://gestor:devpass@localhost:5432/gestiontareas?schema=public
# ==========================================================================
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gestor
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: gestiontareas
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestor -d gestiontareas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
